<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KC ONOLA INTERIOR DESIGNS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 3rem 0;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .content {
            padding: 3rem 0;
            text-align: center;
        }
        
        .content h2 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>KC ONOLA INTERIOR DESIGNS</h1>
            <p>Transform Your Space with Elegant Design</p>
        </div>
    </header>
    
    <div class="container">
        <div class="content">
            <h2>Welcome to Our Interior Design Studio</h2>
            <p>We create beautiful, functional spaces that reflect your style and personality.</p>
        </div>
    </div>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 KC ONOLA INTERIOR DESIGNS. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
